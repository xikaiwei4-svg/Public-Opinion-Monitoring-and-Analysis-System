<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园舆情检测与热点话题分析系统 - 简易仪表盘</title>
  <!-- 引入必要的库 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    
    #root {
      min-height: 100vh;
    }
    
    .dashboard-container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .header h1 {
      color: #1890ff;
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .header p {
      color: #666;
      font-size: 14px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.2s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
    }
    
    .stat-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .stat-label {
      color: #666;
      font-size: 14px;
    }
    
    .stat-trend {
      font-size: 12px;
      margin-top: 4px;
    }
    
    .stat-trend.up {
      color: #52c41a;
    }
    
    .stat-trend.down {
      color: #ff4d4f;
    }
    
    .charts-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .chart-container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      min-height: 400px;
    }
    
    .chart-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 16px;
      text-align: center;
      color: #333;
    }
    
    .chart {
      width: 100%;
      height: 350px;
    }
    
    .topics-section {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .section-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #333;
    }
    
    .topics-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .topics-table th,
    .topics-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .topics-table th {
      background-color: #fafafa;
      font-weight: 600;
      color: #333;
    }
    
    .topics-table tr:hover {
      background-color: #f5f5f5;
    }
    
    .trend-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      text-align: center;
      line-height: 16px;
      border-radius: 50%;
      font-size: 12px;
    }
    
    .trend-icon.up {
      background-color: #f6ffed;
      color: #52c41a;
    }
    
    .trend-icon.down {
      background-color: #fff2f0;
      color: #ff4d4f;
    }
    
    .trend-icon.stable {
      background-color: #f0f0f0;
      color: #666;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .error {
      background-color: #fff2f0;
      color: #ff4d4f;
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    @media (max-width: 768px) {
      .charts-section {
        grid-template-columns: 1fr;
      }
      
      .chart-container {
        min-height: 300px;
      }
      
      .chart {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // 获取React的hooks
    const { useState, useEffect } = React;
    
    // 模拟数据
    const mockStatistics = {
      todayOpinions: 238,
      hotTopics: 12,
      followers: 567,
      positivePercentage: 65,
      negativePercentage: 20,
      neutralPercentage: 15
    };
    
    const mockTrendData = [
      { date: '10/1', count: 180 },
      { date: '10/2', count: 210 },
      { date: '10/3', count: 195 },
      { date: '10/4', count: 240 },
      { date: '10/5', count: 225 },
      { date: '10/6', count: 260 },
      { date: '10/7', count: 238 }
    ];
    
    const mockPlatformData = [
      { name: '微信', value: 45 },
      { name: '微博', value: 30 },
      { name: '贴吧', value: 15 },
      { name: '论坛', value: 10 }
    ];
    
    const mockHotTopics = [
      { id: 1, title: '校园食堂新菜品评价',热度: 95, trend: 'up' },
      { id: 2, title: '图书馆扩建计划讨论',热度: 88, trend: 'up' },
      { id: 3, title: '校园安全问题反馈',热度: 82, trend: 'down' },
      { id: 4, title: '新生入学指南分享',热度: 78, trend: 'up' },
      { id: 5, title: '校园活动安排公告',热度: 75, trend: 'stable' }
    ];
    
    // 主应用组件
    const DashboardApp = () => {
      // 状态管理
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [statistics, setStatistics] = useState(mockStatistics);
      const [trendData, setTrendData] = useState(mockTrendData);
      const [platformData, setPlatformData] = useState(mockPlatformData);
      const [hotTopics, setHotTopics] = useState(mockHotTopics);
      
      // 获取数据
      useEffect(() => {
        const fetchData = async () => {
          try {
            setLoading(true);
            setError(null);
            
            // 尝试从API获取数据，如果失败则使用模拟数据
            try {
              // 获取统计数据
              const statsResponse = await axios.get('http://localhost:8000/api/opinions/statistics');
              if (statsResponse.data && statsResponse.data.data) {
                setStatistics(statsResponse.data.data);
              }
            } catch (err) {
              console.log('使用模拟统计数据');
            }
            
            try {
              // 获取趋势数据
              const trendResponse = await axios.get('http://localhost:8000/api/trend/opinion');
              if (trendResponse.data && trendResponse.data.data) {
                setTrendData(trendResponse.data.data);
              }
            } catch (err) {
              console.log('使用模拟趋势数据');
            }
            
            try {
              // 获取平台分布数据
              const platformResponse = await axios.get('http://localhost:8000/api/trend/platform-distribution');
              if (platformResponse.data && platformResponse.data.data) {
                setPlatformData(platformResponse.data.data);
              }
            } catch (err) {
              console.log('使用模拟平台分布数据');
            }
          } catch (err) {
            setError('获取数据失败，请检查网络连接或稍后再试');
            console.error('获取数据失败:', err);
          } finally {
            setLoading(false);
          }
        };
        
        fetchData();
      }, []);
      
      // 初始化图表
      useEffect(() => {
        if (!loading) {
          // 初始化趋势图
          const trendChart = echarts.init(document.getElementById('trend-chart'));
          trendChart.setOption({
            title: {
              text: '舆情趋势分析',
              left: 'center'
            },
            tooltip: {
              trigger: 'axis'
            },
            xAxis: {
              type: 'category',
              data: trendData.map(item => item.date)
            },
            yAxis: {
              type: 'value'
            },
            series: [
              {
                name: '舆情数量',
                type: 'line',
                data: trendData.map(item => item.count),
                smooth: true,
                lineStyle: {
                  color: '#1890ff'
                },
                areaStyle: {
                  color: {
                    type: 'linear',
                    x: 0,
                    y: 0,
                    x2: 0,
                    y2: 1,
                    colorStops: [{
                      offset: 0,
                      color: 'rgba(24, 144, 255, 0.3)'
                    }, {
                      offset: 1,
                      color: 'rgba(24, 144, 255, 0.05)'
                    }]
                  }
                }
              }
            ]
          });
          
          // 初始化平台分布图
          const platformChart = echarts.init(document.getElementById('platform-chart'));
          platformChart.setOption({
            title: {
              text: '平台分布',
              left: 'center'
            },
            tooltip: {
              trigger: 'item'
            },
            legend: {
              orient: 'vertical',
              left: 'left'
            },
            series: [
              {
                name: '平台分布',
                type: 'pie',
                radius: '50%',
                data: platformData,
                emphasis: {
                  itemStyle: {
                    shadowBlur: 10,
                    shadowOffsetX: 0,
                    shadowColor: 'rgba(0, 0, 0, 0.5)'
                  }
                }
              }
            ]
          });
          
          // 响应式调整
          window.addEventListener('resize', () => {
            trendChart.resize();
            platformChart.resize();
          });
          
          // 清理函数
          return () => {
            trendChart.dispose();
            platformChart.dispose();
          };
        }
      }, [loading, trendData, platformData]);
      
      // 渲染趋势图标
      const renderTrendIcon = (trend) => {
        if (trend === 'up') {
          return <span className="trend-icon up">↑</span>;
        } else if (trend === 'down') {
          return <span className="trend-icon down">↓</span>;
        } else {
          return <span className="trend-icon stable">→</span>;
        }
      };
      
      return (
        <div className="dashboard-container">
          {/* 头部 */}
          <div className="header">
            <h1>校园舆情检测与热点话题分析系统</h1>
            <p>实时监控校园舆情动态，智能分析热点话题</p>
          </div>
          
          {/* 错误提示 */}
          {error && <div className="error">{error}</div>}
          
          {/* 加载状态 */}
          {loading ? (
            <div className="loading">加载数据中...</div>
          ) : (
            <>
              {/* 统计卡片 */}
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-icon">📈</div>
                  <div className="stat-value">{statistics.todayOpinions}</div>
                  <div className="stat-label">今日舆情</div>
                  <div className="stat-trend up">较昨日 +12%</div>
                </div>
                
                <div className="stat-card">
                  <div className="stat-icon">🔥</div>
                  <div className="stat-value">{statistics.hotTopics}</div>
                  <div className="stat-label">热点话题</div>
                  <div className="stat-trend up">较昨日 +2</div>
                </div>
                
                <div className="stat-card">
                  <div className="stat-icon">👥</div>
                  <div className="stat-value">{statistics.followers}</div>
                  <div className="stat-label">关注用户</div>
                  <div className="stat-trend up">较昨日 +8</div>
                </div>
                
                <div className="stat-card">
                  <div className="stat-icon">😊</div>
                  <div className="stat-value">{statistics.positivePercentage}%</div>
                  <div className="stat-label">正面情感</div>
                  <div className="stat-trend up">较昨日 +3%</div>
                </div>
              </div>
              
              {/* 图表部分 */}
              <div className="charts-section">
                <div className="chart-container">
                  <div className="chart-title">舆情趋势分析</div>
                  <div id="trend-chart" className="chart"></div>
                </div>
                
                <div className="chart-container">
                  <div className="chart-title">平台分布</div>
                  <div id="platform-chart" className="chart"></div>
                </div>
              </div>
              
              {/* 热点话题表格 */}
              <div className="topics-section">
                <div className="section-title">热门话题排行</div>
                <table className="topics-table">
                  <thead>
                    <tr>
                      <th>排名</th>
                      <th>话题名称</th>
                      <th>热度指数</th>
                      <th>趋势</th>
                    </tr>
                  </thead>
                  <tbody>
                    {hotTopics.map((topic, index) => (
                      <tr key={topic.id}>
                        <td>{index + 1}</td>
                        <td>{topic.title}</td>
                        <td>{topic.热度}</td>
                        <td>{renderTrendIcon(topic.trend)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </div>
      );
    };
    
    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
