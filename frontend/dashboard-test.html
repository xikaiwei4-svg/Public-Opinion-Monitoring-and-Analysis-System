<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园舆情系统测试</title>
  <!-- 使用CDN加载React相关库 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/react-router-dom@6.22.3/dist/umd/react-router-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Ant Design CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.css">
  <script src="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
    }
    #root {
      height: 100vh;
      width: 100vw;
    }
    .container {
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // 导入React和React Router组件
    const { useState } = React;
    const { BrowserRouter, Routes, Route, Link } = ReactRouterDOM;
    const { Button, Layout, Menu, Typography } = antd;
    const { Header, Content, Sider } = Layout;
    const { Title } = Typography;

    // 简单的Dashboard组件
    const Dashboard = () => {
      return (
        <div className="container">
          <Title>仪表盘</Title>
          <p>欢迎来到校园舆情系统仪表盘！</p>
          <Button type="primary">查看数据</Button>
        </div>
      );
    };

    // 简单的登录组件
    const LoginPage = () => {
      return (
        <div className="container">
          <Title>登录</Title>
          <p>请登录系统</p>
          <Button type="primary">登录</Button>
        </div>
      );
    };

    // 简单的App组件
    const App = () => {
      return (
        <BrowserRouter>
          <Routes>
            <Route path="/" element={<Dashboard />} />
            <Route path="/login" element={<LoginPage />} />
          </Routes>
        </BrowserRouter>
      );
    };

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
