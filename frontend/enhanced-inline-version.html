<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园舆情分析系统 - 增强版</title>
  <style>
    :root {
      --primary-color: #4096ff;
      --primary-light: #69b1ff;
      --primary-dark: #337ecc;
      --success-color: #52c41a;
      --warning-color: #faad14;
      --error-color: #f5222d;
      --heading-color: #262626;
      --text-color: #595959;
      --text-secondary: #8c8c8c;
      --border-color: #d9d9d9;
      --bg-color: #f5f5f5;
      --card-bg: #ffffff;
      --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-medium: 0 4px 16px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s ease;
      --border-radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* 登录页面样式 */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .login-box {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-medium);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      transition: var(--transition);
    }

    .login-box:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo h1 {
      color: var(--primary-color);
      font-size: 28px;
      font-weight: 600;
      margin: 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--heading-color);
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      font-size: 14px;
      transition: var(--transition);
      background-color: var(--card-bg);
    }

    .input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(64, 150, 255, 0.2);
    }

    .input::placeholder {
      color: var(--text-secondary);
    }

    /* 按钮样式 */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      background-color: var(--card-bg);
      color: var(--text-color);
      min-width: 80px;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button-primary {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    .button-primary:hover {
      background-color: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .button-danger {
      background-color: var(--error-color);
      color: white;
      border-color: var(--error-color);
    }

    .button-danger:hover {
      background-color: #cf1322;
      border-color: #cf1322;
    }

    .button-full {
      width: 100%;
    }

    /* 仪表盘样式 */
    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* 侧边栏样式 */
    .sidebar {
      width: 240px;
      background: var(--card-bg);
      box-shadow: var(--shadow-light);
      transition: var(--transition);
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 1000;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-header h1 {
      color: var(--primary-color);
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    .sidebar-menu {
      padding: 20px 0;
    }

    .menu-item {
      padding: 12px 24px;
      cursor: pointer;
      transition: var(--transition);
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      color: var(--text-color);
      text-decoration: none;
      font-size: 14px;
    }

    .menu-item:hover {
      background-color: #f0f5ff;
      color: var(--primary-color);
    }

    .menu-item.active {
      background-color: #e6f7ff;
      color: var(--primary-color);
      border-left-color: var(--primary-color);
      font-weight: 500;
    }

    .menu-icon {
      margin-right: 12px;
      font-size: 16px;
    }

    /* 主内容区样式 */
    .main-content {
      flex: 1;
      margin-left: 240px;
      transition: var(--transition);
    }

    /* 头部样式 */
    .header {
      background: var(--card-bg);
      box-shadow: var(--shadow-light);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 900;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--heading-color);
    }

    .user-info {
      display: flex;
      align-items: center;
    }

    .user-name {
      margin-right: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--heading-color);
    }

    /* 内容区域 */
    .content {
      padding: 24px;
    }

    /* 卡片样式 */
    .card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-light);
      padding: 24px;
      margin-bottom: 24px;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-medium);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--heading-color);
      margin: 0;
    }

    .card-extra {
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* 网格布局 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    /* 统计卡片 */
    .stat-card {
      text-align: center;
      padding: 24px;
      border-radius: var(--border-radius);
      background: var(--card-bg);
      box-shadow: var(--shadow-light);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--primary-color);
    }

    .stat-card:nth-child(2)::before {
      background: var(--success-color);
    }

    .stat-card:nth-child(3)::before {
      background: var(--warning-color);
    }

    .stat-card:hover {
      box-shadow: var(--shadow-medium);
      transform: translateY(-3px);
    }

    .stat-icon {
      font-size: 32px;
      color: var(--primary-color);
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .stat-card:nth-child(2) .stat-icon {
      color: var(--success-color);
    }

    .stat-card:nth-child(3) .stat-icon {
      color: var(--warning-color);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--heading-color);
      margin-bottom: 8px;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* 表格样式 */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background-color: #fafafa;
      font-weight: 600;
      color: var(--heading-color);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 2px solid var(--border-color);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-color);
    }

    tr:hover td {
      background-color: #fafafa;
    }

    /* 状态标签 */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-positive {
      background-color: #f6ffed;
      color: var(--success-color);
      border: 1px solid #b7eb8f;
    }

    .status-negative {
      background-color: #fff2f0;
      color: var(--error-color);
      border: 1px solid #ffccc7;
    }

    .status-neutral {
      background-color: #f5f5f5;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .trend-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .trend-up {
      background-color: #f6ffed;
      color: var(--success-color);
      border: 1px solid #b7eb8f;
    }

    .trend-down {
      background-color: #fff2f0;
      color: var(--error-color);
      border: 1px solid #ffccc7;
    }

    .trend-stable {
      background-color: #f5f5f5;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
      
      .main-content {
        margin-left: 200px;
      }
      
      .grid {
        grid-template-columns: 1fr;
      }
      
      .card {
        padding: 16px;
      }
    }

    @media (max-width: 640px) {
      .sidebar {
        transform: translateX(-100%);
      }
      
      .sidebar.active {
        transform: translateX(0);
      }
      
      .main-content {
        margin-left: 0;
      }
      
      .menu-icon {
        margin-right: 8px;
      }
    }

    /* 动画效果 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease;
    }

    /* 骨架屏效果 */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }

    @keyframes skeleton-loading {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // 简单的状态管理
    const state = {
      isAuthenticated: false,
      token: null,
      userInfo: null,
      currentPage: 'dashboard'
    };
    
    // 模拟数据 - 增加更多数据以丰富界面
    const mockOpinions = [
      { id: 1, content: '校园食堂饭菜价格上涨了，希望学校能够考虑学生的实际情况', sentiment: 'negative', time: '2023-09-27 10:30', source: '微信公众号', category: '生活服务', likes: 42, comments: 18 },
      { id: 2, content: '图书馆新增了很多新书，环境也改善了，学习氛围很好！', sentiment: 'positive', time: '2023-09-27 09:15', source: '校园论坛', category: '学习环境', likes: 85, comments: 32 },
      { id: 3, content: '宿舍空调温度调节系统需要改进，有时候太冷有时候太热', sentiment: 'negative', time: '2023-09-26 22:45', source: '匿名吐槽墙', category: '生活服务', likes: 67, comments: 45 },
      { id: 4, content: '校园招聘会规模很大，来了很多知名企业，就业机会很多', sentiment: 'positive', time: '2023-09-26 14:20', source: '微博', category: '就业信息', likes: 123, comments: 58 },
      { id: 5, content: '学校网络速度太慢，经常断线，影响学习效率', sentiment: 'negative', time: '2023-09-25 16:10', source: '校园论坛', category: '基础设施', likes: 94, comments: 62 },
      { id: 6, content: '校园文化节活动很精彩，丰富了我们的课余生活', sentiment: 'positive', time: '2023-09-25 19:30', source: '抖音', category: '校园文化', likes: 156, comments: 78 },
    ];
    
    const mockHotTopics = [
      { id: 1, title: '校园食堂改革讨论', heat: 92, trend: 'up', relatedCount: 156 },
      { id: 2, title: '期末考试安排调整', heat: 88, trend: 'up', relatedCount: 142 },
      { id: 3, title: '新生入学指南', heat: 76, trend: 'down', relatedCount: 98 },
      { id: 4, title: '校园安全整治行动', heat: 65, trend: 'stable', relatedCount: 78 },
      { id: 5, title: '校园文化节活动安排', heat: 58, trend: 'up', relatedCount: 63 },
    ];
    
    // 情感统计数据
    const sentimentStats = {
      positive: 126,
      negative: 89,
      neutral: 45
    };
    
    // 简单的路由系统
    let currentPath = window.location.pathname;
    const router = {
      navigate: (path) => {
        currentPath = path;
        renderApp();
      },
      getPath: () => currentPath
    };
    
    // 渲染辅助函数 - 增强功能
    const createElement = (tag, props, ...children) => {
      const element = document.createElement(tag);
      
      if (props) {
        Object.entries(props).forEach(([key, value]) => {
          if (key === 'className') {
            element.className = value;
          } else if (key === 'onClick') {
            element.addEventListener('click', value);
          } else if (key === 'id') {
            element.id = value;
          } else if (key === 'type') {
            element.type = value;
          } else if (key === 'placeholder') {
            element.placeholder = value;
          } else if (key === 'value') {
            element.value = value;
          } else if (key === 'name') {
            element.name = value;
          } else if (key === 'href') {
            element.href = value;
          } else if (key === 'target') {
            element.target = value;
          } else if (key.startsWith('data-')) {
            element.setAttribute(key, value);
          } else {
            element[key] = value;
          }
        });
      }
      
      children.forEach(child => {
        if (typeof child === 'string') {
          element.appendChild(document.createTextNode(child));
        } else if (child instanceof Node) {
          element.appendChild(child);
        }
      });
      
      return element;
    };
    
    // 登录页面组件
    const LoginPage = () => {
      const handleLogin = () => {
        // 模拟登录
        state.isAuthenticated = true;
        state.token = 'mock-jwt-token';
        state.userInfo = { name: '管理员', role: 'admin' };
        router.navigate('/dashboard');
      };
      
      const container = createElement('div', { className: 'login-container' });
      
      const loginBox = createElement('div', { className: 'login-box animate-fade-in' });
      
      const logo = createElement('div', { className: 'login-logo' });
      logo.appendChild(createElement('h1', null, '校园舆情分析系统'));
      
      const form = createElement('div');
      
      const usernameGroup = createElement('div', { className: 'form-group' });
      usernameGroup.appendChild(createElement('label', { className: 'form-label' }, '用户名'));
      usernameGroup.appendChild(createElement('input', { type: 'text', className: 'input', placeholder: '请输入用户名', defaultValue: 'admin' }));
      
      const passwordGroup = createElement('div', { className: 'form-group' });
      passwordGroup.appendChild(createElement('label', { className: 'form-label' }, '密码'));
      passwordGroup.appendChild(createElement('input', { type: 'password', className: 'input', placeholder: '请输入密码', defaultValue: 'password' }));
      
      const loginButton = createElement('button', { className: 'button button-primary button-full', onClick: handleLogin }, '登录');
      
      form.appendChild(usernameGroup);
      form.appendChild(passwordGroup);
      form.appendChild(loginButton);
      
      loginBox.appendChild(logo);
      loginBox.appendChild(form);
      container.appendChild(loginBox);
      
      return container;
    };
    
    // 侧边栏组件
    const Sidebar = () => {
      const menuItems = [
        { key: 'dashboard', label: '仪表盘', icon: '📊' },
        { key: 'opinions', label: '舆情列表', icon: '📝' },
        { key: 'hot-topics', label: '热门话题', icon: '🔥' },
        { key: 'trend', label: '趋势分析', icon: '📈' },
        { key: 'settings', label: '系统设置', icon: '⚙️' }
      ];
      
      const sidebar = createElement('div', { className: 'sidebar' });
      
      const header = createElement('div', { className: 'sidebar-header' });
      header.appendChild(createElement('h1', null, '校园舆情分析系统'));
      
      const menu = createElement('nav', { className: 'sidebar-menu' });
      
      menuItems.forEach(item => {
        const menuItem = createElement('a', {
          className: `menu-item ${state.currentPage === item.key ? 'active' : ''}`,
          href: `#${item.key}`,
          onClick: (e) => {
            e.preventDefault();
            state.currentPage = item.key;
            renderApp();
          }
        });
        
        menuItem.appendChild(createElement('span', { className: 'menu-icon' }, item.icon));
        menuItem.appendChild(createElement('span', null, item.label));
        
        menu.appendChild(menuItem);
      });
      
      sidebar.appendChild(header);
      sidebar.appendChild(menu);
      
      return sidebar;
    };
    
    // 头部组件
    const Header = () => {
      const handleLogout = () => {
        state.isAuthenticated = false;
        state.token = null;
        state.userInfo = null;
        router.navigate('/login');
      };
      
      const header = createElement('div', { className: 'header' });
      
      const title = createElement('h2', { className: 'header-title' }, getPageTitle());
      
      const userInfo = createElement('div', { className: 'user-info' });
      userInfo.appendChild(createElement('span', { className: 'user-name' }, `欢迎, ${state.userInfo?.name || '管理员'}`));
      userInfo.appendChild(createElement('button', { className: 'button button-danger', onClick: handleLogout }, '退出登录'));
      
      header.appendChild(title);
      header.appendChild(userInfo);
      
      return header;
    };
    
    // 获取页面标题
    function getPageTitle() {
      switch(state.currentPage) {
        case 'dashboard': return '仪表盘';
        case 'opinions': return '舆情列表';
        case 'hot-topics': return '热门话题';
        case 'trend': return '趋势分析';
        case 'settings': return '系统设置';
        default: return '仪表盘';
      }
    }
    
    // 仪表盘页面组件
    const Dashboard = () => {
      const container = createElement('div', { className: 'app-container' });
      
      // 侧边栏
      container.appendChild(Sidebar());
      
      // 主内容区
      const mainContent = createElement('div', { className: 'main-content' });
      
      // 头部
      mainContent.appendChild(Header());
      
      // 内容区域
      const content = createElement('div', { className: 'content animate-fade-in' });
      
      // 统计卡片
      const statsGrid = createElement('div', { className: 'grid' });
      
      statsGrid.appendChild(createElement('div', { className: 'stat-card' }, 
        createElement('div', { className: 'stat-icon' }, '📊'),
        createElement('div', { className: 'stat-value' }, mockOpinions.length),
        createElement('div', { className: 'stat-label' }, '总舆情数')
      ));
      
      statsGrid.appendChild(createElement('div', { className: 'stat-card' }, 
        createElement('div', { className: 'stat-icon' }, '🔥'),
        createElement('div', { className: 'stat-value' }, mockHotTopics.length),
        createElement('div', { className: 'stat-label' }, '热门话题数')
      ));
      
      const totalSentiment = sentimentStats.positive + sentimentStats.negative + sentimentStats.neutral;
      const positivePercentage = Math.round((sentimentStats.positive / totalSentiment) * 100);
      
      statsGrid.appendChild(createElement('div', { className: 'stat-card' }, 
        createElement('div', { className: 'stat-icon' }, '😊'),
        createElement('div', { className: 'stat-value' }, `${positivePercentage}%`),
        createElement('div', { className: 'stat-label' }, '正面情绪占比')
      ));
      
      content.appendChild(statsGrid);
      
      // 舆情列表卡片
      const opinionCard = createElement('div', { className: 'card' });
      
      const opinionHeader = createElement('div', { className: 'card-header' });
      opinionHeader.appendChild(createElement('h3', { className: 'card-title' }, '最新舆情'));
      opinionHeader.appendChild(createElement('a', { className: 'button', href: '#opinions', onClick: (e) => {
        e.preventDefault();
        state.currentPage = 'opinions';
        renderApp();
      }}, '查看全部'));
      
      opinionCard.appendChild(opinionHeader);
      
      const opinionTableContainer = createElement('div', { className: 'table-container' });
      const opinionTable = createElement('table');
      
      const opinionThead = createElement('thead');
      const opinionHeaderRow = createElement('tr');
      opinionHeaderRow.appendChild(createElement('th', null, '内容'));
      opinionHeaderRow.appendChild(createElement('th', null, '情感'));
      opinionHeaderRow.appendChild(createElement('th', null, '来源'));
      opinionHeaderRow.appendChild(createElement('th', null, '时间'));
      opinionHeaderRow.appendChild(createElement('th', null, '互动'));
      opinionThead.appendChild(opinionHeaderRow);
      
      const opinionTbody = createElement('tbody');
      mockOpinions.slice(0, 5).forEach(opinion => {
        const row = createElement('tr');
        
        // 内容列，限制长度并添加省略号
        const contentCell = createElement('td', null, truncateText(opinion.content, 30));
        contentCell.title = opinion.content; // 悬停显示完整内容
        row.appendChild(contentCell);
        
        // 情感列
        const sentimentClass = `status-badge status-${opinion.sentiment}`;
        const sentimentText = opinion.sentiment === 'positive' ? '正面' : 
                            opinion.sentiment === 'negative' ? '负面' : '中性';

      ));

    // 辅助函数：根据热度获取颜色
    function getHeatColor(heat) {
      if (heat >= 80) return '#f5222d';
      if (heat >= 60) return '#faad14';
      if (heat >= 40) return '#52c41a';
      return '#1890ff';
    }
    
    // 辅助函数：截断文本
    function truncateText(text, maxLength) {
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength) + '...';
    }
    
    // 获取当前页面组件
    function getCurrentPageComponent() {
      switch(state.currentPage) {
        case 'dashboard': return Dashboard();
        case 'opinions': return OpinionsPage();
        case 'hot-topics': return HotTopicsPage();
        case 'trend': return TrendPage();
        case 'settings': return SettingsPage();
        default: return Dashboard();
      }
    }
    
    // 应用渲染
    const renderApp = () => {
      const root = document.getElementById('root');
      root.innerHTML = '';
      
      const path = router.getPath();
      
      if (!state.isAuthenticated && path !== '/login') {
        router.navigate('/login');
        return;
      }
      
      if (path === '/login') {
        root.appendChild(LoginPage());
      } else {
        // 渲染当前页面组件
        root.appendChild(getCurrentPageComponent());
      }
    };
    
    // 初始化渲染
    renderApp();
    
    // 监听路径变化
    window.addEventListener('popstate', () => {
      currentPath = window.location.pathname;
      renderApp();
    });
