<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纯HTML测试页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      padding: 8px 16px;
      background-color: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #40a9ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>纯HTML测试页面</h1>
    <p>这是一个不依赖任何外部资源的测试页面。</p>
    <p id="counter">计数器: 0</p>
    <button onclick="incrementCounter()">增加计数</button>
  </div>
  
  <script>
    let count = 0;
    
    function incrementCounter() {
      count++;
      document.getElementById('counter').textContent = '计数器: ' + count;
    }
  </script>
</body>
</html>
